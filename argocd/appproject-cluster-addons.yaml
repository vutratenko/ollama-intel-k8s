apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  description: Cluster-scoped add-ons (NFD, device plugins prerequisites)
  sourceRepos:
    - https://github.com/vutratenko/ollama-intel-k8s.git
    - '*'
  destinations:
    - namespace: node-feature-discovery
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  # NFD создаёт ClusterRole, ClusterRoleBinding и др. cluster-scoped ресурсы.
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

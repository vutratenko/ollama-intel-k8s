apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  description: Cluster-scoped add-ons (NFD и прочая инфраструктура)
  sourceRepos:
    - https://github.com/vutratenko/ollama-intel-k8s.git
    - '*'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  # NFD: ClusterRole, ClusterRoleBinding, CRD, Namespace и др.
  # Пустой whitelist = запрет всего cluster-scoped; нужен wildcard.
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

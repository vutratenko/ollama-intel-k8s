apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Устанавливает Node Feature Discovery (NFD) и Intel GPU device plugin.
#
# Порядок:
#   1. kubectl apply -k ollama-intel/device-plugin/
#   2. Дождаться метки intel.feature.node.kubernetes.io/gpu=true на целевой ноде
#   3. kubectl apply -k ollama-intel/
#
# Если NFD уже установлен в кластере — закомментируйте remote resource ниже.
# Чтобы plugin работал на всех GPU-нодах — уберите gpu-plugin-target-node.yaml из patches.

resources:
  - https://github.com/intel/intel-device-plugins-for-kubernetes/deployments/nfd?ref=v0.36.0
  - configmap.yaml
  - intel-gpu-plugin.yaml

patches:
  - path: gpu-plugin-target-node.yaml
    target:
      group: apps
      version: v1
      kind: DaemonSet
      name: intel-gpu-plugin
      namespace: kube-system

replacements:
  - source:
      kind: ConfigMap
      name: device-plugin-config
      namespace: kube-system
      fieldPath: data.TARGET_NODE
    targets:
      - select:
          kind: DaemonSet
          name: intel-gpu-plugin
          namespace: kube-system
        fieldPaths:
          - spec.template.spec.nodeSelector.[kubernetes.io/hostname]

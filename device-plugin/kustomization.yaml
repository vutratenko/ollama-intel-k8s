apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Intel GPU device plugin в namespace ollama (ArgoCD AppProject ollama).
# Опционален: Ollama использует GPU через hostPath /dev/dri без device plugin.
#
# Привязка к ноде — через TARGET_NODE в configmap.yaml (kustomize replacement).
# Чтобы plugin работал на всех amd64-нодах — уберите gpu-plugin-target-node.yaml из patches.

namespace: ollama

resources:
  - configmap.yaml
  - intel-gpu-plugin.yaml

patches:
  - path: gpu-plugin-target-node.yaml
    target:
      group: apps
      version: v1
      kind: DaemonSet
      name: intel-gpu-plugin
      namespace: ollama

replacements:
  - source:
      kind: ConfigMap
      name: device-plugin-config
      namespace: ollama
      fieldPath: data.TARGET_NODE
    targets:
      - select:
          kind: DaemonSet
          name: intel-gpu-plugin
          namespace: ollama
        fieldPaths:
          - spec.template.spec.nodeSelector.[kubernetes.io/hostname]
